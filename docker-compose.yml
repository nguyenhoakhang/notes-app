services:
  mysql:
    image: mysql:8.0
    container_name: noteapp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: noteapp
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: noteapp
      MYSQL_PASSWORD: noteapp
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - noteapp

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noteapp_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
    depends_on:
      - mysql
    networks:
      - noteapp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noteapp_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - noteapp
    command: npm run dev -- --host 0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: noteapp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - noteapp

  hocuspocus:
    image: node:20-alpine
    container_name: noteapp_hocuspocus
    working_dir: /app
    command: sh -c "npm install && node server.js"
    volumes:
      - ./hocuspocus:/app
    ports:
      - "1234:1234"
    networks:
      - noteapp

volumes:
  mysql_data:

networks:
  noteapp:
    driver: bridge